services:
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: docaudit-web
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_NAME: ${APP_NAME:-DocAudit}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-docaudit}:${POSTGRES_PASSWORD:-docaudit}@db:5432/${POSTGRES_DB:-docaudit}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-mistralai/ministral-3b-2512}
      OPENROUTER_CONNECT_TIMEOUT_SECONDS: ${OPENROUTER_CONNECT_TIMEOUT_SECONDS:-5}
      OPENROUTER_WRITE_TIMEOUT_SECONDS: ${OPENROUTER_WRITE_TIMEOUT_SECONDS:-10}
      OPENROUTER_READ_TIMEOUT_SECONDS: ${OPENROUTER_READ_TIMEOUT_SECONDS:-30}
      OPENROUTER_POOL_TIMEOUT_SECONDS: ${OPENROUTER_POOL_TIMEOUT_SECONDS:-5}
      OPENROUTER_TIMEOUT_RETRIES: ${OPENROUTER_TIMEOUT_RETRIES:-2}
      OPENROUTER_RATE_LIMIT_ENABLED: ${OPENROUTER_RATE_LIMIT_ENABLED:-true}
      OPENROUTER_RATE_LIMIT_COOLDOWN_SECONDS: ${OPENROUTER_RATE_LIMIT_COOLDOWN_SECONDS:-2}
      OPENROUTER_RATE_LIMIT_RETRIES: ${OPENROUTER_RATE_LIMIT_RETRIES:-6}
      OPENROUTER_RATE_LIMIT_RETRY_SPREAD_SECONDS: ${OPENROUTER_RATE_LIMIT_RETRY_SPREAD_SECONDS:-1}
      CELERY_DEFAULT_QUEUE: ${CELERY_DEFAULT_QUEUE:-celery}
      CELERY_OBSERVED_QUEUES: ${CELERY_OBSERVED_QUEUES:-celery}
      CELERY_INSPECT_TIMEOUT_SECONDS: ${CELERY_INSPECT_TIMEOUT_SECONDS:-1.5}
      CELERY_TASK_SOFT_TIME_LIMIT_SECONDS: ${CELERY_TASK_SOFT_TIME_LIMIT_SECONDS:-55}
      CELERY_TASK_TIME_LIMIT_SECONDS: ${CELERY_TASK_TIME_LIMIT_SECONDS:-60}
      OBSERVABILITY_EVENT_RETENTION: ${OBSERVABILITY_EVENT_RETENTION:-2000}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: docaudit-worker
    command: celery -A backend.app.workers.tasks.celery_app worker --loglevel=info --pool=prefork --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    environment:
      APP_NAME: ${APP_NAME:-DocAudit}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-docaudit}:${POSTGRES_PASSWORD:-docaudit}@db:5432/${POSTGRES_DB:-docaudit}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-mistralai/ministral-3b-2512}
      OPENROUTER_CONNECT_TIMEOUT_SECONDS: ${OPENROUTER_CONNECT_TIMEOUT_SECONDS:-5}
      OPENROUTER_WRITE_TIMEOUT_SECONDS: ${OPENROUTER_WRITE_TIMEOUT_SECONDS:-10}
      OPENROUTER_READ_TIMEOUT_SECONDS: ${OPENROUTER_READ_TIMEOUT_SECONDS:-30}
      OPENROUTER_POOL_TIMEOUT_SECONDS: ${OPENROUTER_POOL_TIMEOUT_SECONDS:-5}
      OPENROUTER_TIMEOUT_RETRIES: ${OPENROUTER_TIMEOUT_RETRIES:-2}
      OPENROUTER_RATE_LIMIT_ENABLED: ${OPENROUTER_RATE_LIMIT_ENABLED:-true}
      OPENROUTER_RATE_LIMIT_COOLDOWN_SECONDS: ${OPENROUTER_RATE_LIMIT_COOLDOWN_SECONDS:-2}
      OPENROUTER_RATE_LIMIT_RETRIES: ${OPENROUTER_RATE_LIMIT_RETRIES:-6}
      OPENROUTER_RATE_LIMIT_RETRY_SPREAD_SECONDS: ${OPENROUTER_RATE_LIMIT_RETRY_SPREAD_SECONDS:-1}
      CELERY_DEFAULT_QUEUE: ${CELERY_DEFAULT_QUEUE:-celery}
      CELERY_OBSERVED_QUEUES: ${CELERY_OBSERVED_QUEUES:-celery}
      CELERY_INSPECT_TIMEOUT_SECONDS: ${CELERY_INSPECT_TIMEOUT_SECONDS:-1.5}
      CELERY_TASK_SOFT_TIME_LIMIT_SECONDS: ${CELERY_TASK_SOFT_TIME_LIMIT_SECONDS:-55}
      CELERY_TASK_TIME_LIMIT_SECONDS: ${CELERY_TASK_TIME_LIMIT_SECONDS:-60}
      OBSERVABILITY_EVENT_RETENTION: ${OBSERVABILITY_EVENT_RETENTION:-2000}
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: docaudit-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docaudit}
      POSTGRES_USER: ${POSTGRES_USER:-docaudit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docaudit}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docaudit} -d ${POSTGRES_DB:-docaudit}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: docaudit-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
